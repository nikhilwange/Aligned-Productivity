
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aligned - Workspace Intelligence. Transform conversations into actionable insights with AI-powered transcription and analysis." />
    <title>Aligned | Workspace Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
      /* ═══════════════════════════════════════════════════════════════════
         ALIGNED DESIGN SYSTEM v2.0 - Premium Dark Theme
         ═══════════════════════════════════════════════════════════════════ */
      
      :root {
        /* ─── Core Brand Colors ─── */
        --brand-gold: #f59e0b;
        --brand-amber: #fbbf24;
        --brand-gold-dark: #d97706;
        
        /* ─── Deep Purple Palette ─── */
        --purple-50: #faf5ff;
        --purple-100: #f3e8ff;
        --purple-200: #e9d5ff;
        --purple-300: #d8b4fe;
        --purple-400: #c084fc;
        --purple-500: #a855f7;
        --purple-600: #9333ea;
        --purple-700: #7c3aed;
        --purple-800: #6b21a8;
        --purple-900: #581c87;
        --purple-950: #3b0764;
        
        /* ─── Teal Accent Palette ─── */
        --teal-50: #f0fdfa;
        --teal-100: #ccfbf1;
        --teal-200: #99f6e4;
        --teal-300: #5eead4;
        --teal-400: #2dd4bf;
        --teal-500: #14b8a6;
        --teal-600: #0d9488;
        --teal-700: #0f766e;
        --teal-800: #115e59;
        --teal-900: #134e4a;
        
        /* ─── Surface Colors ─── */
        --surface-950: #0a0a0f;
        --surface-900: #0f0f17;
        --surface-850: #131320;
        --surface-800: #18182a;
        --surface-700: #1e1e35;
        --surface-600: #252542;
        --surface-500: #2d2d4a;
        --surface-400: #3d3d5c;
        --surface-300: #4d4d6a;
        
        /* ─── Text Colors ─── */
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.7);
        --text-tertiary: rgba(255, 255, 255, 0.5);
        --text-muted: rgba(255, 255, 255, 0.35);
        
        /* ─── Glassmorphism ─── */
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-bg-hover: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-border-hover: rgba(255, 255, 255, 0.15);
        --glass-glow: rgba(168, 85, 247, 0.15);
        
        /* ─── Constants ─── */
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;
        --space-16: 4rem;
        --space-20: 5rem;
        
        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;
        --radius-2xl: 1.25rem;
        --radius-3xl: 1.5rem;
        --radius-4xl: 2rem;
        --radius-full: 9999px;
        
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.6);

        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-spring: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* ─── Role tokens (mode-agnostic alias layer) ───
         Consumers should prefer --bg / --text / --accent over --surface-*.
         The numbered surface ladder remains for legacy callers but is being
         phased out (see review v3 §02 / Sprint 2). */
      :root {
        --bg:           var(--surface-950);
        --bg-elevated:  var(--surface-800);
        --bg-sunken:    var(--surface-900);
        --border:       var(--glass-border);
        --border-strong: var(--glass-border-hover);
        --text:         var(--text-primary);
        --accent:       var(--brand-amber);
        --accent-fg:    #000;
        --accent-soft:  rgba(251, 191, 36, 0.12);
        --accent-2:     #b85a3c;        /* terra brick — reads on white & cream */
        --accent-2-soft: rgba(184, 90, 60, 0.18);
        --accent-signal:  #ef4444;
        --accent-success: #34d399;

        /* Primary CTA pill — high-contrast inverse of the page surface.
           Dark: white pill with near-black text. Light: dark ink pill with cream text. */
        --cta-bg:       #ffffff;
        --cta-fg:       #0a0a0f;
        --cta-fg-muted: rgba(10, 10, 15, 0.62);

        /* Granola-shaped surface conventions, available in both modes */
        --radius-surface: 22px;
        --radius-pill:    100px;
        --radius-card:    16px;
      }

      /* ─── Light Theme · Granola-warm ───
         Off-white ivory base with deep olive accent and terra-warm secondary.
         Friendly modern Mac-app feel — generous radii, soft shadows.
         Single accent system; no purple/teal differentiation in this mode. */
      .light {
        /* Ivory paper foundation */
        --surface-950: #f7f5ef;   /* page bg */
        --surface-900: #efece3;   /* alt / sunken */
        --surface-850: #e8e5db;
        --surface-800: #ffffff;   /* elevated cards (pure white) */
        --surface-700: rgba(28, 29, 26, 0.10);
        --surface-600: #9b9d93;
        --surface-500: #6a6c64;   /* muted text rank */
        --surface-400: #44463f;
        --surface-300: #1c1d1a;

        --text-primary:   #1c1d1a;
        --text-secondary: #44463f;
        --text-tertiary:  #6a6c64;
        --text-muted:     #6a6c64;            /* 4.6:1 on #f7f5ef */

        /* Honest cards — pure white surfaces, 7% hairline */
        --glass-bg:        #ffffff;
        --glass-bg-hover:  #efece3;
        --glass-border:    rgba(28, 29, 26, 0.07);
        --glass-border-hover: rgba(28, 29, 26, 0.14);
        --glass-glow:      rgba(74, 107, 58, 0.10);

        /* Role aliases */
        --bg:           #f7f5ef;
        --bg-elevated:  #ffffff;
        --bg-sunken:    #efece3;
        --border:       rgba(28, 29, 26, 0.07);
        --border-strong: rgba(28, 29, 26, 0.10);
        --text:         #1c1d1a;
        --accent:       #4a6b3a;              /* deep olive · 5.4:1 */
        --accent-fg:    #ffffff;
        --accent-soft:  rgba(74, 107, 58, 0.10);   /* highlighted-stat tint */
        --accent-2:     #d97757;              /* terra warm — secondary */
        --accent-2-soft: rgba(217, 119, 87, 0.12);
        --accent-signal:  #b85a3c;            /* recording / live · 4.8:1 */
        --accent-success: #4a6b3a;            /* olive doubles as done */

        /* Primary CTA pill — granola pattern: dark ink pill on cream */
        --cta-bg:       #1c1d1a;
        --cta-fg:       #f7f5ef;
        --cta-fg-muted: rgba(247, 245, 239, 0.65);

        /* Soft Mac-app shadow stack — inset highlight + drop */
        --surface-shadow:
          0 1px 0 rgba(255, 255, 255, 0.8) inset,
          0 0 0 1px rgba(28, 29, 26, 0.05),
          0 18px 42px -22px rgba(28, 29, 26, 0.18),
          0 4px 12px -6px rgba(28, 29, 26, 0.08);

        --shadow-sm: 0 1px 2px rgba(28, 29, 26, 0.04);
        --shadow-md: 0 4px 6px -1px rgba(28, 29, 26, 0.08), 0 2px 4px -1px rgba(28, 29, 26, 0.04);
        --shadow-lg: 0 10px 15px -3px rgba(28, 29, 26, 0.08), 0 4px 6px -2px rgba(28, 29, 26, 0.04);
        --shadow-xl: 0 20px 25px -5px rgba(28, 29, 26, 0.10), 0 10px 10px -5px rgba(28, 29, 26, 0.04);
        --shadow-2xl: 0 30px 60px -28px rgba(28, 29, 26, 0.20), 0 12px 28px -12px rgba(28, 29, 26, 0.12);
      }

      /* ─── Light Theme · Accent class remaps ───
         Granola is single-accent. Collapse Tailwind amber/teal/purple-* refs
         to olive (with terra reserved for recording/error). */
      .light .text-amber-400,
      .light .text-amber-300,
      .light .text-amber-500,
      .light .text-amber-600,
      .light .text-teal-400,
      .light .text-teal-300,
      .light .text-teal-500 { color: #4a6b3a; }
      .light .text-purple-400,
      .light .text-purple-300,
      .light .text-purple-500 { color: #6a6c64; }
      .light .text-red-400,
      .light .text-red-500,
      .light .text-orange-400,
      .light .text-orange-500 { color: #b85a3c; }

      /* Background-tint remaps — common alpha variants only.
         Tailwind's class names contain `/` so they need escaping. */
      .light .bg-amber-500\/10,
      .light .bg-amber-500\/15,
      .light .bg-amber-500\/12,
      .light .bg-amber-500\/14 { background-color: rgba(74, 107, 58, 0.10); }
      .light .bg-amber-500\/20,
      .light .bg-amber-500\/30 { background-color: rgba(74, 107, 58, 0.18); }
      .light .bg-amber-500,
      .light .bg-amber-400,
      .light .hover\:bg-amber-400:hover { background-color: var(--accent); color: var(--accent-fg); }
      .light .border-amber-500\/20,
      .light .border-amber-500\/30,
      .light .border-amber-500\/35 { border-color: rgba(74, 107, 58, 0.22); }
      .light .bg-teal-500\/10,
      .light .bg-teal-500\/15 { background-color: rgba(74, 107, 58, 0.10); }
      .light .bg-purple-500\/10,
      .light .bg-purple-500\/12,
      .light .bg-purple-500\/06,
      .light .bg-purple-500\/\[0\.06\] { background-color: rgba(28, 29, 26, 0.04); }
      .light .border-purple-500\/12,
      .light .border-purple-500\/20,
      .light .border-purple-500\/25,
      .light .border-purple-500\/30 { border-color: rgba(28, 29, 26, 0.08); }

      /* Token-driven brand text */
      .text-brand { color: var(--accent); }
      .text-signal { color: var(--accent-signal); }
      .text-success { color: var(--accent-success); }

      /* Surfaces that only make sense in dark mode (purple/teal orbs,
         heavy gradient halos). Wrap them in .dark-only and they vanish
         in granola light. */
      .light .dark-only { display: none !important; }
      
      /* ─── Base Styles ─── */
      * {
        box-sizing: border-box;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: var(--surface-950);
        color: var(--text-primary);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background-color var(--transition-slow), color var(--transition-slow);
      }
      
      .font-mono {
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      }

      .font-display {
        font-family: 'DM Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-optical-sizing: auto;
        font-feature-settings: "ss01";
        letter-spacing: -0.02em;
      }
      .font-display-tight {
        font-family: 'DM Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-optical-sizing: auto;
        font-feature-settings: "ss01";
        letter-spacing: -0.035em;
      }
      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }

      /* ─── Focus ring (keyboard-only) ───
         Visible amber ring for keyboard nav; pointer focus stays quiet.
         Elements that explicitly set `focus:outline-none` (inputs, textareas)
         still opt-out of the default outline; they render their own focus
         state via border color changes. */
      :focus {
        outline: none;
      }
      :focus-visible {
        outline: 2px solid var(--brand-gold);
        outline-offset: 2px;
        border-radius: 6px;
        transition: outline-offset 120ms ease;
      }
      /* Inputs/textareas keep their border-based focus; no ring needed */
      input:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        outline: none;
      }

      /* ─── Selection ─── */
      ::selection {
        background: rgba(168, 85, 247, 0.3);
        color: white;
      }
      
      /* ─── Scrollbar ───
         Thin, quiet rail that only shows on scroll-hover. Pill thumb in a
         muted surface tone so it fades into dark backgrounds until the user
         interacts with a scroll container. */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-full);
        border: 2px solid transparent;
        background-clip: content-box;
        transition: background 160ms ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.22);
        background-clip: content-box;
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* ─── Skeleton shimmer ─── */
      @keyframes skeleton-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(255,255,255,0.04) 0%,
          rgba(255,255,255,0.09) 50%,
          rgba(255,255,255,0.04) 100%
        );
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.4s ease-in-out infinite;
        border-radius: 8px;
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton { animation: none; background: rgba(255,255,255,0.05); }
      }
      .light .skeleton {
        background: linear-gradient(
          90deg,
          rgba(26, 22, 18, 0.04) 0%,
          rgba(26, 22, 18, 0.09) 50%,
          rgba(26, 22, 18, 0.04) 100%
        );
        background-size: 200% 100%;
      }
      .light ::selection {
        background: rgba(154, 107, 26, 0.22);
        color: var(--text-primary);
      }
      .light * {
        scrollbar-color: rgba(26, 22, 18, 0.18) transparent;
      }
      .light ::-webkit-scrollbar-thumb {
        background: rgba(26, 22, 18, 0.12);
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .light ::-webkit-scrollbar-thumb:hover {
        background: rgba(26, 22, 18, 0.28);
        background-clip: content-box;
      }

      /* ═══════════════════════════════════════════════════════════════════
         GLASSMORPHISM COMPONENTS
         ═══════════════════════════════════════════════════════════════════ */
      
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
      }

      .glass-hover:hover {
        background: var(--glass-bg-hover);
        border-color: var(--glass-border-hover);
      }

      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.02) 100%
        );
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      /* Light-mode honest cards — no blur, no smudge.
         backdrop-blur is reserved for the sticky top bar (see top-bar styles). */
      .light .glass {
        background: var(--bg-elevated);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: 1px solid var(--border);
      }
      .light .glass-hover:hover {
        background: var(--glass-bg-hover);
        border-color: var(--border-strong);
      }
      .light .glass-card {
        background: var(--bg-elevated);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
      }
      
      .glass-input {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all var(--transition-base);
      }

      .glass-input:focus {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--purple-500);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        outline: none;
      }

      /* Light mode overrides for glass-input */
      .light .glass-input {
        background: rgba(15, 23, 42, 0.04);
        border: 1px solid rgba(15, 23, 42, 0.12);
        color: var(--text-primary);
      }
      .light .glass-input:focus {
        background: rgba(15, 23, 42, 0.06);
        border-color: var(--purple-500);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        outline: none;
      }
      .light .glass-input::placeholder {
        color: var(--text-muted);
      }

      /* Date picker calendar icon styling */
      .glass-input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.6);
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.2s;
      }
      .glass-input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }
      [data-theme="light"] .glass-input[type="date"]::-webkit-calendar-picker-indicator {
        filter: none;
        opacity: 0.5;
      }
      [data-theme="light"] .glass-input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 0.8;
      }
      
      /* ═══════════════════════════════════════════════════════════════════
         GRADIENT UTILITIES
         ═══════════════════════════════════════════════════════════════════ */
      
      .gradient-brand {
        background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-amber) 50%, var(--brand-gold-dark) 100%);
      }
      
      .gradient-purple {
        background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-700) 100%);
      }
      
      .gradient-teal {
        background: linear-gradient(135deg, var(--teal-400) 0%, var(--teal-600) 100%);
      }
      
      .gradient-mesh {
        background: 
          radial-gradient(at 40% 20%, var(--purple-900) 0px, transparent 50%),
          radial-gradient(at 80% 0%, var(--teal-900) 0px, transparent 50%),
          radial-gradient(at 0% 50%, var(--purple-950) 0px, transparent 50%),
          radial-gradient(at 80% 50%, var(--surface-900) 0px, transparent 50%),
          radial-gradient(at 0% 100%, var(--purple-900) 0px, transparent 50%),
          radial-gradient(at 80% 100%, var(--teal-950) 0px, transparent 50%),
          var(--surface-950);
      }
      
      .gradient-text-brand {
        background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-amber) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .gradient-text-purple {
        background: linear-gradient(135deg, var(--purple-400) 0%, var(--purple-600) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Light-mode gradient overrides — purple→teal mesh and purple text
         become invisible on cream. Collapse to solid brass / cream radials. */
      .light .gradient-text-brand,
      .light .gradient-text-purple {
        background: none;
        -webkit-text-fill-color: var(--accent);
        color: var(--accent);
      }
      .light .gradient-mesh {
        background:
          radial-gradient(at 20% 10%, rgba(154, 107, 26, 0.06) 0px, transparent 55%),
          radial-gradient(at 80% 0%,  rgba(154, 58, 28, 0.04) 0px, transparent 55%),
          radial-gradient(at 0% 90%,  rgba(154, 107, 26, 0.05) 0px, transparent 55%),
          var(--bg);
      }
      .light .gradient-brand {
        background: var(--accent);
      }
      .light .gradient-purple,
      .light .gradient-teal {
        background: var(--accent);
      }
      
      /* ─── Animated Gradient Border ─── */
      .gradient-border {
        position: relative;
        background: var(--surface-900);
        border-radius: var(--radius-2xl);
      }
      
      .gradient-border::before {
        content: '';
        position: absolute;
        inset: -1px;
        padding: 1px;
        border-radius: inherit;
        background: linear-gradient(135deg, var(--purple-500), var(--teal-500), var(--brand-gold));
        -webkit-mask: 
          linear-gradient(#fff 0 0) content-box, 
          linear-gradient(#fff 0 0);
        mask: 
          linear-gradient(#fff 0 0) content-box, 
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      
      /* ═══════════════════════════════════════════════════════════════════
         BUTTON COMPONENTS
         ═══════════════════════════════════════════════════════════════════ */
      
      .btn-primary {
        background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%);
        color: white;
        font-weight: 600;
        padding: 0.875rem 1.5rem;
        border-radius: var(--radius-xl);
        transition: all var(--transition-base);
        box-shadow: 0 4px 14px rgba(245, 158, 11, 0.25);
      }
      
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.35);
      }
      
      .btn-primary:active {
        transform: translateY(0) scale(0.98);
      }
      
      .btn-secondary {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-primary);
        font-weight: 600;
        padding: 0.875rem 1.5rem;
        border-radius: var(--radius-xl);
        transition: all var(--transition-base);
        backdrop-filter: blur(12px);
      }
      
      .btn-secondary:hover {
        background: var(--glass-bg-hover);
        border-color: var(--glass-border-hover);
      }
      
      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        font-weight: 500;
        padding: 0.625rem 1rem;
        border-radius: var(--radius-lg);
        transition: all var(--transition-fast);
      }
      
      .btn-ghost:hover {
        background: var(--glass-bg);
        color: var(--text-primary);
      }
      
      /* ═══════════════════════════════════════════════════════════════════
         ANIMATIONS
         ═══════════════════════════════════════════════════════════════════ */
      
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes fade-in-up {
        from { 
          opacity: 0; 
          transform: translateY(20px);
        }
        to { 
          opacity: 1; 
          transform: translateY(0);
        }
      }
      
      @keyframes fade-in-down {
        from { 
          opacity: 0; 
          transform: translateY(-20px);
        }
        to { 
          opacity: 1; 
          transform: translateY(0);
        }
      }
      
      @keyframes slide-up {
        from { 
          transform: translateY(30px); 
          opacity: 0; 
        }
        to { 
          transform: translateY(0); 
          opacity: 1; 
        }
      }
      
      @keyframes slide-in-right {
        from { 
          transform: translateX(100%); 
          opacity: 0; 
        }
        to { 
          transform: translateX(0); 
          opacity: 1; 
        }
      }
      
      @keyframes scale-in {
        from { 
          transform: scale(0.95); 
          opacity: 0; 
        }
        to { 
          transform: scale(1); 
          opacity: 1; 
        }
      }
      
      @keyframes float {
        0%, 100% { 
          transform: translateY(0px) rotate(0deg); 
        }
        50% { 
          transform: translateY(-15px) rotate(1deg); 
        }
      }
      
      @keyframes pulse-glow {
        0%, 100% { 
          opacity: 0.4;
          transform: scale(1);
        }
        50% { 
          opacity: 0.7;
          transform: scale(1.05);
        }
      }
      
      @keyframes soft-pulse {
        0%, 100% { 
          transform: scale(1); 
          opacity: 0.3; 
        }
        50% { 
          transform: scale(1.15); 
          opacity: 0.5; 
        }
      }
      
      @keyframes shimmer {
        0% { 
          background-position: -200% 0; 
        }
        100% { 
          background-position: 200% 0; 
        }
      }
      
      @keyframes rotate-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes wave {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1); }
      }
      
      @keyframes ripple {
        0% { 
          transform: scale(0.8);
          opacity: 1;
        }
        100% { 
          transform: scale(2.4);
          opacity: 0;
        }
      }
      
      @keyframes bounce-subtle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      /* Animation Classes */
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }
      
      .animate-fade-in-up {
        animation: fade-in-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      
      .animate-fade-in-down {
        animation: fade-in-down 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      
      .animate-slide-up {
        animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      
      .animate-scale-in {
        animation: scale-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      
      .animate-pulse-glow {
        animation: pulse-glow 3s ease-in-out infinite;
      }
      
      .animate-soft-pulse {
        animation: soft-pulse 4s ease-in-out infinite;
      }
      
      .animate-shimmer {
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      
      .animate-rotate-slow {
        animation: rotate-slow 20s linear infinite;
      }
      
      .animate-gradient {
        background-size: 200% 200%;
        animation: gradient-shift 3s ease infinite;
      }
      
      /* Staggered animations */
      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }
      .stagger-5 { animation-delay: 0.5s; }
      
      /* ═══════════════════════════════════════════════════════════════════
         UTILITY CLASSES
         ═══════════════════════════════════════════════════════════════════ */
      
      .text-balance {
        text-wrap: balance;
      }
      
      /* Noise texture overlay */
      .noise-overlay::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.02;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      
      /* Focus ring */
      .focus-ring:focus {
        outline: none;
        box-shadow: 0 0 0 2px var(--surface-950), 0 0 0 4px var(--purple-500);
      }
      
      /* View transitions */
      .view-transition {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      /* Recording ring animation */
      .recording-ring {
        animation: ripple 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      
      /* Backdrop blur fallback */
      @supports not (backdrop-filter: blur(20px)) {
        .glass,
        .glass-card {
          background: var(--surface-800);
        }
      }

      /* Safe area support for notched devices */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

      /* Prevent tap highlight on mobile */
      * { -webkit-tap-highlight-color: transparent; }

      /* Smooth scrolling on iOS */
      .overflow-y-auto, .overflow-y-scroll {
        -webkit-overflow-scrolling: touch;
      }
    </style>

</head>
